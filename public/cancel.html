<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — ContractGuard AI</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .card{background:#101010;border:1px solid #1e1e1e;border-radius:16px;padding:56px 48px;max-width:480px;width:100%}
    .icon{width:72px;height:72px;background:rgba(245,158,11,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px}
    h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px}
    p{font-size:15px;color:#a0a0a0;line-height:1.65;margin-bottom:32px}
    .btn{display:inline-block;background:#00b4d8;color:#000;padding:15px 40px;border-radius:8px;font-weight:800;font-size:15px;text-decoration:none;transition:opacity .2s}
    .btn:hover{opacity:.88}
    .btn-sec{display:inline-block;color:#a0a0a0;padding:15px 24px;font-size:14px;text-decoration:none;transition:color .2s;margin-left:8px}
    .btn-sec:hover{color:#fff}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">✕</div>
  <h1>Payment cancelled</h1>
  <p>No charge was made. If you ran into any issues or have questions, feel free to reach out.</p>
  <a href="/#pricing" class="btn">View Plans</a>
  <a href="/" class="btn-sec">Back to home</a>
</div>
</body>
</html>
